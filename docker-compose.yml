
services:
  app:
    build: .
    container_name: todo-apps-nuxt
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    networks:
      - nuxt-todo
  db:
    image: postgres:18-alpine
    container_name: todo-apps-nuxt-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=todo-nuxt
    volumes:
      - db:/var/lib/postgresql/data
    networks:
      - nuxt-todo
networks:
  nuxt-todo:
    driver: bridge
volumes:
  db:
    driver: local
    
  